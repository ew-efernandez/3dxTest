<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>SecurityContext por 3DSpace</title>
    <meta name="author" content="DSIS" />
    <meta name="description" content="SecurityContext por 3DSpace" />
    <meta name="apiVersion" content="1.3" />
    <meta name="debugMode" content="true" />
    <meta name="strictMode" content="false" />
    <link rel="stylesheet" type="text/css" href="./styles/Main.css?v=13" />
</head>

<body>
<div class="app">
        <div class="toolbar">
            <h1>SecurityContext por 3DSpace</h1>
            <div class="actions">
                <button id="refresh" class="primary" type="button">Actualizar</button>
            </div>
        </div>

        <div id="status" class="status">Inicializando...</div>

        <div class="summary">
            <div class="metric">
                <div class="metric-label">Plataformas</div>
                <div id="platformCount" class="metric-value">0</div>
            </div>
            <div class="metric">
                <div class="metric-label">SecurityContext</div>
                <div id="contextCount" class="metric-value">0</div>
            </div>
            <div class="metric">
                <div class="metric-label">Errores</div>
                <div id="errorCount" class="metric-value">0</div>
            </div>
        </div>

        <div class="filters">
            <input id="search" type="search" placeholder="Filtrar" />
            <select id="platformFilter" aria-label="Filtrar por plataforma">
                <option value="">Todas las plataformas</option>
            </select>
        </div>

        <div id="spaceList" class="space-list">
            <div class="empty">Esperando datos...</div>
        </div>
    </div>
    <script type="text/javascript" src="./scripts/Main.js?v=14"></script>
</body>
</html>
